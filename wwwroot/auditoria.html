<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Auditoría</title>

<style>
body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.backButton{
    background:#334155;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

.backButton:hover{
    background:#475569;
}

.filters{
    display:flex;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.filters input,
.filters select{

    padding:12px 15px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    font-size:15px;

    border:1px solid #475569;

    outline:none;
}

.filters input{
    width:250px;
}

.filters input::placeholder{
    color:#94a3b8;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
}

th{
    background:#334155;
    padding:15px;
    text-align:left;
    font-size:15px;
}

td{
    padding:15px;
    border-top:1px solid #475569;
}

tr:hover{
    background:#263449;
}

.reserva{
    color:#facc15;
    font-weight:bold;
}

.compra{
    color:#22c55e;
    font-weight:bold;
}

.cancelacion{
    color:#ef4444;
    font-weight:bold;
}

.liberacion{
    color:#3b82f6;
    font-weight:bold;
}

@media(max-width:768px){

    body{
        padding:20px;
    }

    .topbar{
        flex-direction:column;
        gap:20px;
        align-items:flex-start;
    }

    .filters{
        flex-direction:column;
    }

    .filters input{
        width:100%;
    }

    table{
        font-size:14px;
    }

    td,
    th{
        padding:10px;
    }
}
</style>

</head>
<body>

<div class="topbar">

<h1>📋 Auditoría del Sistema</h1>

<button class="backButton" onclick="volver()">
    ← Inicio
</button>

</div>

<div class="filters">

    <input
        type="text"
        id="searchUser"
        placeholder="Buscar usuario..."
        onkeyup="loadAuditoria()"
    >

    <select
        id="filterAction"
        onchange="loadAuditoria()"
    >
        <option value="">
            Todas las acciones
        </option>

        <option value="Reserva">
            Reserva
        </option>

        <option value="Compra">
            Compra
        </option>

        <option value="Cancelación">
            Cancelación
        </option>

    </select>

    <input
        type="text"
        id="searchEvent"
        placeholder="Buscar evento..."
        onkeyup="loadAuditoria()"
    >

    <input
        type="text"
        id="searchEmail"
        placeholder="Buscar email..."
        onkeyup="loadAuditoria()"
    >
</div>

<table>

<thead>
<tr>
<th>Acción</th>
<th>Descripción</th>
<th>Fecha</th>
<th>Usuario</th>
</tr>
</thead>

<tbody id="logs">
</tbody>

</table>

<script>
    const user = JSON.parse(localStorage.getItem("user"));

    if(!user || user.rol !== "Admin"){
        alert("No autorizado");
        window.location.href = "index.html";
    }

    async function loadAuditoria(){

    const response = await fetch("http://localhost:5123/api/Auditoria");

    const logs = await response.json();

    const tbody =
        document.getElementById("logs");

    tbody.innerHTML = "";
    
    const search =
        document.getElementById("searchUser")
        .value
        .toLowerCase();

    const action =
        document.getElementById("filterAction")
        .value;
    
    const searchEvent =
        document.getElementById("searchEvent")
        .value
        .toLowerCase();

    const searchEmail =
        document.getElementById("searchEmail")
        .value
        .toLowerCase();

    const filtered =
        logs.filter(log => {
    
            const matchUser =
                log.usuario
                ?.toLowerCase()
                .includes(search);

            const matchAction =
                !action ||
                log.accion === action;
            
            const matchEvent =
                log.descripcion
                .toLowerCase()
                .includes(searchEvent);

            const matchEmail =
                log.descripcion
                .toLowerCase()
                .includes(searchEmail);

            return (
                matchUser &&
                matchAction &&
                matchEvent &&
                matchEmail
            );
                });

        filtered.forEach(log => {

        let clase = "";

        if(log.accion === "Reserva"){
            clase = "reserva";
        }
        else if(log.accion === "Compra"){
            clase = "compra";
        }
        else if(log.accion === "Cancelación"){
            clase = "cancelacion";
        }
        else if(log.accion === "Liberación automática"){
            clase = "liberacion";
        }

        tbody.innerHTML += `
            <tr>
                <td class="${clase}">
                    ${log.accion}
                </td>

                <td>
                    ${log.descripcion}
                </td>

                <td>
                    ${new Date(log.fecha).toLocaleString()}
                </td>
                <td>
                    ${log.usuario || "-"}
                </td>
            </tr>
        `;
    });
    }

    function volver(){
        window.location.href = "index.html";
    }

    loadAuditoria();

    setInterval(loadAuditoria,1000);

</script>
</body>
</html>
