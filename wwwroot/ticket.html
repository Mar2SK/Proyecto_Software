<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ticket</title>

<style>

body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.ticket{

    width:420px;

    background:#1e293b;

    border-radius:25px;

    overflow:hidden;

    box-shadow:
        0 10px 40px rgba(0,0,0,0.4);
}

.banner{

    width:100%;

    height:220px;

    object-fit:cover;
}

.content{
    padding:30px;
}

h1{
    margin:0;
    font-size:32px;
}

h2{
    margin-top:25px;
}

p{
    color:#cbd5e1;
}

.divider{
    height:1px;
    background:#334155;
    margin:25px 0;
}

.seat{

    background:#0f172a;

    padding:12px;

    border-radius:12px;

    margin-bottom:10px;

    font-size:18px;
}

.qr{

    margin-top:30px;

    text-align:center;

    font-size:28px;

    letter-spacing:5px;

    background:white;

    color:black;

    padding:20px;

    border-radius:20px;
}

.button{
    width:100%;
    margin-top:30px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.button:hover{
    background:#16a34a;
}

@media(max-width:768px){

    .ticket{
        width:100%;
    }

    h1{
        font-size:26px;
    }
}

</style>

</head>
<body>

<div class="ticket">

    <img
    id="eventImage"
    class="banner">

    <div class="content">

        <h1 id="eventName"></h1>

        <p id="venue"></p>

        <div class="divider"></div>

        <h2>🎟 Entradas</h2>

        <div id="seatList"></div>

        <div class="divider"></div>

        <div class="buyer">
            <p id="buyer"></p>
            <p id="email"></p>
            <p id="fecha"></p>
        </div>

        <div class="qr">

            <div style="font-size:90px;">
             🎟
            </div>

            <div id="fakeQr" style="margin-top:10px;"> </div>
        </div>

        <button
            class="button"
            onclick="volver()">

            Volver al inicio

        </button>

    </div>

</div>

<script>

const data =
    JSON.parse(
        localStorage.getItem(
            "ticketData"
        )
    );

if(!data){

    window.location.href =
        "index.html";
}

document.getElementById(
    "eventImage"
).src =
    data.image;

document.getElementById(
    "eventName"
).innerText =
    data.eventName;

document.getElementById(
    "venue"
).innerText =
    data.venue;

document.getElementById(
    "buyer"
).innerText =
    `${data.nombre} ${data.apellido}`;

document.getElementById(
    "email"
).innerText =
    data.email;

document.getElementById(
    "fecha"
).innerText =
    data.fecha;

const seatList =
    document.getElementById(
        "seatList"
    );

data.seats.forEach(seat => {

    seatList.innerHTML += `
        <div class="seat">
            Asiento ${seat}
        </div>
    `;
});

function volver(){

    localStorage.removeItem(
        "ticketData"
    );

    window.location.href =
        "index.html";
}

document.getElementById(
    "fakeQr"
).innerText =
    "QR-" +
    Math.floor(
        Math.random() * 999999
    );
</script>

</body>
</html>
