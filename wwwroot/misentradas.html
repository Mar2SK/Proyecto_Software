<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Mis Entradas</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

header{
    background:#020617;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    border-bottom:1px solid #1e293b;
}

.container{
    padding:30px;
    max-width:1200px;
    margin:auto;
}

.ticket{
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:30px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.banner{
    width:100%;
    height:250px;
    object-fit:cover;
}

.content{
    padding:25px;
}

.content h2{
    margin-top:0;
    font-size:32px;
}

.info{
    margin-top:15px;
    color:#cbd5e1;
    font-size:18px;
}

.qr{
    margin-top:25px;
    background:white;
    color:black;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.qrIcon{
    font-size:80px;
}

.qrCode{
    margin-top:10px;
    font-size:20px;
    font-weight:bold;
}

.back{
    margin-top:30px;
    padding:14px 24px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.back:hover{
    background:#16a34a;
}

.empty{
    text-align:center;
    margin-top:80px;
}

@media(max-width:768px){

    .container{
        padding:15px;
    }

    .banner{
        height:180px;
    }

    .content h2{
        font-size:26px;
    }

    .info{
        font-size:16px;
    }
}

</style>

</head>

<body>

<header>
    🎟 Mis Entradas
</header>

<div class="container" id="tickets"></div>

<script>

const user =
    JSON.parse(
        localStorage.getItem("user")
    );

const tickets =
    JSON.parse(

        localStorage.getItem(
            `tickets_${user.username}`
        )

    ) || [];

const container =
    document.getElementById("tickets");

if(tickets.length === 0){

    container.innerHTML = `

        <div class="empty">

            <h1>
                No tenés entradas todavía
            </h1>

            <button
                class="back"
                onclick="window.location.href='index.html'">

                Volver al inicio

            </button>

        </div>
    `;
}

else{

    tickets.forEach(ticket => {

        const qr =
            Math.floor(
                Math.random() * 999999
            );

        container.innerHTML += `

            <div class="ticket">

                <img
                    class="banner"
                    src="${ticket.image}">

                <div class="content">

                    <h2>
                        ${ticket.eventName}
                    </h2>

                    <div class="info">
                        📍 ${ticket.venue}
                    </div>

                    <div class="info">
                        👤 ${ticket.nombre}
                        ${ticket.apellido}
                    </div>

                    <div class="info">
                        📧 ${ticket.email}
                    </div>

                    <div class="info">
                        🎫 Asientos:
                        ${ticket.seats.join(", ")}
                    </div>

                    <div class="info">
                        🕒 ${ticket.fecha}
                    </div>

                    <div class="qr">

                        <div class="qrIcon">
                            🎟
                        </div>

                        <div class="qrCode">
                            QR-${qr}
                        </div>

                    </div>

                </div>

            </div>
        `;
    });
}

</script>

</body>
</html>
