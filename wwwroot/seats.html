<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa de Asientos</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

header{
    background:#020617;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:30px;
}

h2{
    margin-top:40px;
    border-left:5px solid #22c55e;
    padding-left:10px;
}

.sector{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:10px;
    margin-top:20px;
}

.seat{
    height:45px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.seat:hover{
    transform:scale(1.08);
}

.disponible{
    background:#22c55e;
}

.reservado{
    background:#eab308;
}

.vendido{
    background:#ef4444;
    cursor:not-allowed;
}

.selected{
    border:4px solid white;
    background:#3b82f6 !important;
}

.legend{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.legend div{
    display:flex;
    align-items:center;
    gap:10px;
}

.box{
    width:20px;
    height:20px;
    border-radius:5px;
}

.buy-btn{
    margin-top:40px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.buy-btn:hover{
    background:#2563eb;
}

.backButton{
    background:#334155;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    margin:20px;
    font-size:16px;
}

.backButton:hover{
    background:#475569;
}

@media(max-width:768px){

    .container{
        padding:15px;
    }

    .sector{
        grid-template-columns:repeat(5,1fr);
    }

    .seat{
        height:40px;
        font-size:13px;
    }

    .legend{
        flex-direction:column;
        gap:10px;
    }

    .buy-btn{
        width:100%;
    }
}

</style>

</head>
<body>

<header>
    🎟 Seleccioná tus asientos
</header>

<button class="backButton" onclick="volverInicio()">
    ← Volver al inicio
</button>

<div class="container">

<div class="legend">

    <div>
        <div class="box disponible"></div>
        Disponible
    </div>

    <div>
        <div class="box reservado"></div>
        Reservado
    </div>

    <div>
        <div class="box vendido"></div>
        Vendido
    </div>

</div>

<h2>Sector Campo</h2>
<div id="campo" class="sector"></div>

<h2>Sector Platea</h2>
<div id="platea" class="sector"></div>

<button class="buy-btn" onclick="continuarCompra()">
    Continuar compra
</button>

</div>

<script>

const params =
    new URLSearchParams(window.location.search);

const eventId =
    params.get("eventId");

const API =
`http://localhost:5123/api/events/${eventId}/asientos`;

let selectedSeats = [];

let allSeats = [];

async function loadSeats(){

    try{

        const res =
            await fetch(API);

        if(!res.ok){

            alert(
                "Error conectando con la API"
            );

            return;
        }

        const seats =
            await res.json();

        const eventResponse =
            await fetch(
                "http://localhost:5123/api/events"
            );

        const events =
            await eventResponse.json();

        const currentEvent =
            events.find(
                e => e.id == eventId
            );

        if(currentEvent){

            localStorage.setItem(
                "eventName",
                currentEvent.name
            );

            localStorage.setItem(
                "eventVenue",
                currentEvent.venue
            );

            localStorage.setItem(
                "eventImage",
                currentEvent.imageUrl
            );
        }

        allSeats = seats;

        const platea =
            document.getElementById(
                "platea"
            );

        const campo =
            document.getElementById(
                "campo"
            );

        platea.innerHTML = "";
        campo.innerHTML = "";

        seats.forEach(seat => {

            const selected =
                selectedSeats.some(
                    s => s.id === seat.id
                )
                ? "selected"
                : "";

            const seatHTML = `

                <div 
                    class="
                        seat
                        ${seat.status.toLowerCase()}
                        ${selected}
                    "

                    onclick="
                        toggleSeat(${seat.id})
                    "
                >
                    ${seat.number}
                </div>
            `;

            if(
                seat.sectorName ===
                "Platea"
            ){

                platea.innerHTML +=
                    seatHTML;
            }

            else if(
                seat.sectorName ===
                "Campo"
            ){

                campo.innerHTML +=
                    seatHTML;
            }
        });
    }

    catch(error){

        console.log(error);

        alert(
            "No se pudo conectar al servidor"
        );
    }
}

function toggleSeat(seatId){

    const seat =
        allSeats.find(
            s => s.id == seatId
        );

    if(!seat) return;

    if(seat.status !== "Disponible")
        return;

    // DESELECCIONAR
    if(
        selectedSeats.some(
            x => x.id === seat.id
        )
    ){

        selectedSeats =
            selectedSeats.filter(
                x => x.id !== seat.id
            );

        loadSeats();

        return;
    }

    // LIMITE
    if(selectedSeats.length >= 2){

        alert(
            "Máximo 2 asientos"
        );

        return;
    }

    // AGREGAR
    selectedSeats.push({

        id: seat.id,

        number: seat.number
    });

    loadSeats();
}

function continuarCompra(){

    if(selectedSeats.length === 0){

        alert(
            "Seleccioná al menos un asiento"
        );

        return;
    }

    localStorage.setItem(

        "selectedSeats",

        JSON.stringify(
            selectedSeats
        )
    );

    const user =
        localStorage.getItem(
            "user"
        );

    if(!user){

        window.location.href =
            "login.html";

        return;
    }

    window.location.href =
        `checkout.html?eventId=${eventId}`;
}

function volverInicio(){

    localStorage.removeItem(
        "selectedSeats"
    );

    window.location.href =
        "index.html";
}

loadSeats();

setInterval(() => {

    loadSeats();

},1000);

</script>

</body>
</html>
