<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>

<style>
body{
    background:#0f172a;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:350px;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}
</style>
</head>

<body>

<div class="container">

<h2>Crear cuenta</h2>

<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="username" placeholder="Usuario">
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="register()">Registrarse</button>

</div>

<script>

async function register(){

    const nombre =
        document.getElementById(
            "nombre"
        ).value.trim();

    const apellido =
        document.getElementById(
            "apellido"
        ).value.trim();

    const username =
        document.getElementById(
            "username"
        ).value.trim();

    const email =
        document.getElementById(
            "email"
        ).value.trim();

    const password =
        document.getElementById(
            "password"
        ).value.trim();

    // VALIDAR CAMPOS

    if(
        !nombre ||
        !apellido ||
        !username ||
        !email ||
        !password
    ){

        alert(
            "Completa todos los campos"
        );

        return;
    }

    // VALIDAR EMAIL

    if(
        !email.includes("@")
    ){

        alert(
            "Ingresa un email válido"
        );

        return;
    }

    // VALIDAR PASSWORD

    if(
        password.length < 3
    ){

        alert(
            "La contraseña debe tener al menos 3 caracteres"
        );

        return;
    }

    const response =
        await fetch(
            "http://localhost:5123/api/auth/register",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body: JSON.stringify({

                    nombre,
                    apellido,
                    username,
                    email,
                    password
                })
            });

    // ERROR BACKEND

    if(!response.ok){

        const error =
            await response.text();

        alert(error);

        return;
    }

    alert(
        "Cuenta creada correctamente"
    );

    window.location.href =
        "login.html";
}

</script>

</body>
</html>
