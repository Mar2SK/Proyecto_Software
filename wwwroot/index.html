<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Entradas Premium</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    font-family:Arial;
    color:white;
}

nav{
    height:80px;
    background:#0f172a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 50px;
    border-bottom:1px solid #1e293b;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#22c55e;
}

.menu{
    display:flex;
    gap:20px;
}

.menu button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:0.2s;
}

.menu button:hover{
    background:#334155;
    transform:translateY(-2px);
}

.hero{
    padding:60px;
}

.hero h1{
    font-size:52px;
    margin-bottom:15px;
}

.hero p{
    color:#94a3b8;
    font-size:20px;
}

.events{
    padding:0 60px 60px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
    gap:35px;
}

.card{
    position:relative;
    height:500px;
    border-radius:30px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.95),
        rgba(0,0,0,0.1)
    );
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:35px;
}

.overlay h2{
    font-size:42px;
    margin-bottom:10px;
}

.overlay p{
    color:#cbd5e1;
    margin-bottom:20px;
    font-size:18px;
}

.overlay button{
    width:220px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.overlay button:hover{
    background:#16a34a;
    transform:scale(1.03);
}

.tag{
    position:absolute;
    top:25px;
    left:25px;
    background:#22c55e;
    color:white;
    padding:10px 18px;
    border-radius:50px;
    font-size:14px;
    font-weight:bold;
}

.userInfo{
    display:flex;
    align-items:center;
    padding:12px 18px;
    border-radius:10px;
    background:#020617;
    color:#22c55e;
    font-weight:bold;
    font-size:15px;
}

.welcome{
    padding:12px 20px;
    border-radius:14px;

    background:linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );

    color:white;

    font-weight:bold;

    font-size:15px;

    letter-spacing:0.5px;

    box-shadow:
        0 4px 15px rgba(34,197,94,0.3);

    display:flex;
    align-items:center;

    @media(max-width:768px){

    nav{
        flex-direction:column;
        height:auto;
        padding:20px;
        gap:20px;
    }

    .hero{
        padding:30px 20px;
        text-align:center;
    }

    .hero h1{
        font-size:36px;
    }

    .hero p{
        font-size:16px;
    }

    .events{
        grid-template-columns:1fr;
        padding:20px;
    }

    .card{
        height:420px;
    }

    .overlay h2{
        font-size:28px;
    }

    .overlay button{
        width:100%;
    }

    .menu{
        flex-wrap:wrap;
        justify-content:center;
    }
}

.available{

    margin-top:12px;

    margin-bottom:12px;

    font-size:15px;

    font-weight:bold;

    color:#22c55e;

    background:rgba(34,197,94,0.12);

    padding:8px 12px;

    border-radius:12px;

    display:inline-block;
}

button:disabled{

    background:#475569;

    cursor:not-allowed;
}
}
</style>

</head>
<body>

<nav>

<div class="logo">
    🎟 Entradas Premium
</div>

<div class="menu" id="menu"></div>

</nav>

<section class="hero">

<h1>Viví la música en vivo</h1>

<p>
Comprá entradas para los mejores shows del mundo.
</p>

</section>

<section class="events" id="events">
</section>

<script>

function showMessage(text, success = true){

    const div =
        document.createElement("div");

    div.innerText = text;

    div.style.position = "fixed";

    div.style.top = "20px";

    div.style.right = "20px";

    div.style.padding = "15px 20px";

    div.style.borderRadius = "12px";

    div.style.fontWeight = "bold";

    div.style.zIndex = "9999";

    div.style.boxShadow =
        "0 5px 20px rgba(0,0,0,0.3)";

    div.style.background =
        success
        ? "#22c55e"
        : "#ef4444";

    div.style.color = "white";

    div.style.opacity = "0";

    div.style.transition = "0.3s";

    document.body.appendChild(div);

    setTimeout(() => {
        div.style.opacity = "1";
    },10);

    setTimeout(() => {

        div.style.opacity = "0";

        setTimeout(() => {
            div.remove();
        },300);

    },3000);
}

const user = JSON.parse(localStorage.getItem("user"));

const menu =
    document.getElementById("menu");

// MENU

if(!user){

    menu.innerHTML = `
        <button onclick="window.location.href='login.html'">
            Ingresar
        </button>

        <button onclick="window.location.href='register.html'">
            Registrarse
        </button>
    `;
}

else if(user.rol === "User"){

    menu.innerHTML = `
        <div class="welcome">
            👋 ${user.username}
        </div>
        <button onclick="window.location.href='misentradas.html'">
            Mis Entradas
        </button>
        <button onclick="logout()">
            Salir
        </button>
    `;
}

else if(user.rol === "Admin"){

    menu.innerHTML = `
        <div class="welcome">
            ${user.username}
        </div>
        <button onclick="window.location.href='misentradas.html'">
            Mis Entradas
        </button>
        <button onclick="goAuditoria()">
            Auditoría
        </button>

        <button onclick="window.location.href='admin.html'">
            Admin
        </button>

        <button onclick="logout()">
            Salir
        </button>
    `;
}

// CARGAR EVENTOS
async function loadEvents(){

    const response =
        await fetch(
            "http://localhost:5123/api/events"
        );

    const events =
        await response.json();

    const container =
        document.getElementById("events");

    container.innerHTML = "";

    events.forEach(event => {

        container.innerHTML += `

    <div class="card">

        <div class="tag">
            LIVE
        </div>

        <img src="${
            event.imageUrl ||
            'https://via.placeholder.com/500x500'
        }">

        <div class="overlay">

            <h2>
                ${event.name}
            </h2>

            <p>
                ${event.venue}
            </p>

            <div class="available">

                ${
                    event.availableSeats > 0
                    ? `🎟 ${event.availableSeats} disponibles`
                    : `❌ AGOTADO`
                }

            </div>

            <button
                onclick="goEvent(${event.id})"

                ${
                    event.availableSeats <= 0
                    ? "disabled"
                    : ""
                }
            >
                ${
                    event.availableSeats > 0
                    ? "Comprar entradas"
                    : "Sin stock"
                }
            </button>

        </div>

    </div>
`;
    });
}

//Editar Evento
async function editarEvento(id){

    const nombre =
        prompt("Nuevo nombre");

    if(!nombre) return;

    const venue =
        prompt("Nuevo lugar");

    if(!venue) return;

    const addPlatea =
        prompt("Agregar butacas Platea");

    const addCampo =
        prompt("Agregar butacas Campo");

    const input =
        document.createElement("input");

    input.type = "file";

    input.accept = "image/*";

    input.onchange = async () => {

        const file =
            input.files[0];

        const formData =
            new FormData();

        formData.append("name", nombre);

        formData.append("venue", venue);

        formData.append(
            "addPlatea",
            addPlatea || 0
        );

        formData.append(
            "addCampo",
            addCampo || 0
        );

        if(file){
            formData.append("image", file);
        }

        const response = await fetch(
            `http://localhost:5123/api/events/${id}`,
            {
                method:"PUT",
                body: formData
            });

        if(response.ok){

            showMessage("Evento editado correctamente");

            loadEvents();
        }
        else{
            showMessage("Error editando evento", false);
        }
    };

    input.click();
}

// FUNCIONES
function goEvent(id){

    localStorage.removeItem(
        "selectedSeats"
    );

    window.location.href =
        `seats.html?eventId=${id}`;
}

function goAuditoria(){

    window.location.href =
        "auditoria.html";
}

function logout(){

    localStorage.removeItem("user");

    window.location.href =
        "index.html";
}

loadEvents();

</script>

</body>
</html>
