<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Entradas Premium</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    font-family:Arial;
    color:white;
}

/* NAVBAR */

nav{
    height:80px;
    background:#0f172a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 50px;
    border-bottom:1px solid #1e293b;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#22c55e;
}

.menu{
    display:flex;
    gap:20px;
}

.menu button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:0.2s;
}

.menu button:hover{
    background:#334155;
    transform:translateY(-2px);
}

/* HERO */

.hero{
    padding:60px;
}

.hero h1{
    font-size:52px;
    margin-bottom:15px;
}

.hero p{
    color:#94a3b8;
    font-size:20px;
}

/* CARDS */

.events{
    padding:0 60px 60px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
    gap:35px;
}

.card{
    position:relative;
    height:500px;
    border-radius:30px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.95),
        rgba(0,0,0,0.1)
    );
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:35px;
}

.overlay h2{
    font-size:42px;
    margin-bottom:10px;
}

.overlay p{
    color:#cbd5e1;
    margin-bottom:20px;
    font-size:18px;
}

.overlay button{
    width:220px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.overlay button:hover{
    background:#16a34a;
    transform:scale(1.03);
}

.tag{
    position:absolute;
    top:25px;
    left:25px;
    background:#22c55e;
    color:white;
    padding:10px 18px;
    border-radius:50px;
    font-size:14px;
    font-weight:bold;
}

</style>

</head>
<body>

<nav>

<div class="logo">
    🎟 Entradas Premium
</div>

<div class="menu">

<button onclick="goAuditoria()">
    Auditoría
</button>

</div>

</nav>

<section class="hero">

<h1>Viví la música en vivo</h1>

<p>
Comprá entradas para los mejores shows del mundo.
</p>

</section>

<section class="events">

<!-- DUKI -->

<div class="card">

<div class="tag">
    HOT
</div>

<img src="https://enagenda.com.ar/uploads/noticias/5/2025/06/20250602181554_duki-x-irishsuarez-036.jpg">

<div class="overlay">

<h2>Duki World Tour</h2>

<p>
Movistar Arena • Buenos Aires • 14 Nov
</p>

<button onclick="goEvent(1)">
    Comprar entradas
</button>

</div>

</div>

<!-- BOCA - RIVER -->

<div class="card">

<div class="tag">
    SOLD FAST
</div>

<img src="https://www.lanacion.com.ar/resizer/v2/la-durisima-patada-de-marcos-rojo-que-derivo-en-GVH4JYH6PFBY7HL6YUXSDWR7OE.JPG?auth=452b2d8910b20b48db97c01a0bf265ee4afd8ade068e79f953376ad023b01b76&width=1200&height=800&quality=70&smart=true">

<div class="overlay">

<h2>BOCA vs RIVER</h2>

<p>
River Plate • Buenos Aires • 22 Nov
</p>

<button onclick="goEvent(2)">
    Comprar entradas
</button>

</div>

</div>

</section>

<script>

function goEvent(id){

    localStorage.removeItem("selectedSeats");

    window.location.href =
        `seats.html?eventId=${id}`;
}

function goAuditoria(){

    window.location.href =
        "auditoria.html";
}

</script>

</body>
</html>
